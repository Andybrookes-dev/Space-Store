<!-- // Admin protection using real session -->
<script>

fetch("/api/session")
  .then(res => res.json())
  .then(data => {
    if (!data.loggedIn || !["superadmin", "admin"].includes(data.role)) {
      window.location.href = "/index.html";
    }
  });
</script>
