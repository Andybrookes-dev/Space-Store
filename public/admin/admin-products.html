<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin – Products</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Tron Styles -->
    <link rel="stylesheet" href="/assets/css/styles.css">
</head>

<body>

<!-- ⭐ ADMIN ACCESS PROTECTION ⭐ -->
<script>
async function checkAdminAccess() {
    const res = await fetch("/api/session");
    const session = await res.json();

    if (!session.loggedIn || !["superadmin", "admin"].includes(session.role)) {
        window.location.href = "/index.html";
    }
}
checkAdminAccess();
</script>

<!-- ⭐ NAVBAR ⭐ -->
<nav class="navbar navbar-expand-lg tron-navbar">
    <div class="container-fluid">

        <a class="navbar-brand d-flex align-items-center" href="admin-products.html">
            <img src="/assets/images/logo.png" class="logo-icon me-2">
            <span class="brand-text">Admin Panel</span>
        </a>

        <span id="greeting" class="text-light ms-3"></span>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">

            <form id="searchForm" class="d-flex me-3" role="search">
                <select id="categoryFilter" class="form-select me-2">
                    <option value="">All Categories</option>
                </select>

                <select id="activeFilter" class="form-select me-2">
                    <option value="">All</option>
                    <option value="1">Active</option>
                    <option value="0">Inactive</option>
                </select>

                <input id="searchInput" class="form-control me-2" type="search"
                       placeholder="Search products...">

                <button class="btn tron-btn" type="button" onclick="applyFilters()">Search</button>
            </form>

            <ul class="navbar-nav ms-auto mb-2 mb-lg-0"></ul>
        </div>

    </div>
</nav>

<div class="tron-divider"></div>

<!-- ⭐ PRODUCT LIST ⭐ -->
<section class="admin-section">
    <h2 class="section-title">Products</h2>

    <div class="text-end mb-3">
        <a href="admin-add-product.html" class="btn tron-btn">Add New Product</a>
    </div>

    <div class="table-responsive">
        <table class="table table-dark table-striped table-hover align-middle">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Price (£)</th>
                    <th>Category</th>
                    <th>Active</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="productTable"></tbody>
        </table>
    </div>
</section>

<footer class="tron-footer">
    <div class="footer-content">
        <p>© 2026 Galactic Threads</p>
    </div>
</footer>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/navbar.js"></script>

<script>
let allProducts = [];

/* ---------------------------
   LOAD PRODUCTS
---------------------------- */
async function loadProducts() {
    const res = await fetch("/api/admin/products");
    allProducts = await res.json();
    applyFilters();
}

/* ---------------------------
   RENDER PRODUCTS
---------------------------- */
function renderProducts(products) {
    const table = document.getElementById("productTable");
    table.innerHTML = "";

    products.forEach(p => {
        table.innerHTML += `
            <tr>
                <td>${p.id}</td>
                <td>${p.name}</td>
                <td>£${p.price.toFixed(2)}</td>
                <td>${p.category || "Uncategorised"}</td>
                <td>${p.active ? "Yes" : "No"}</td>
                <td>
                    <a href="admin-edit-product.html?id=${p.id}" class="btn btn-sm btn-primary">Edit</a>
                    <button class="btn btn-sm btn-danger" onclick="deleteProduct(${p.id})">Delete</button>
                </td>
            </tr>
        `;
    });
}

/* ---------------------------
   LOAD CATEGORY FILTER
---------------------------- */
async function loadCategoryFilter() {
    const res = await fetch("/api/categories");
    const categories = await res.json();

    const filter = document.getElementById("categoryFilter");

    categories.forEach(cat => {
        filter.innerHTML += `<option value="${cat.name}">${cat.name}</option>`;
    });
}

/* ---------------------------
   APPLY FILTERS
---------------------------- */
function applyFilters() {
    const search = document.getElementById("searchInput").value.toLowerCase();
    const category = document.getElementById("categoryFilter").value;
    const active = document.getElementById("activeFilter").value;

    let filtered = allProducts.filter(p => {
        const matchesSearch =
            p.name.toLowerCase().includes(search) ||
            (p.category && p.category.toLowerCase().includes(search)) ||
            p.price.toString().includes(search);

        const matchesCategory =
            category === "" || p.category === category;

        const matchesActive =
            active === "" || p.active.toString() === active;

        return matchesSearch && matchesCategory && matchesActive;
    });

    renderProducts(filtered);
}

/* ---------------------------
   DELETE PRODUCT
---------------------------- */
async function deleteProduct(id) {
    if (!confirm("Are you sure you want to permanently delete this product?")) return;

    const res = await fetch(`/api/admin/product/${id}`, {
        method: "DELETE"
    });

    const data = await res.json();
    alert(data.message);

    if (res.ok) loadProducts();
}

/* ---------------------------
   INIT
---------------------------- */
loadProducts();
loadCategoryFilter();
</script>

</body>
</html>
