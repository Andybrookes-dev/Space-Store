<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin – Product Editor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 900px;
      margin: auto;
    }
    h2 { margin-top: 0; }
    .variant-row {
      display: flex;
      gap: 10px;
      margin-bottom: 8px;
      align-items: center;
    }
    .variant-row input {
      width: 80px;
    }
    .variant-row button {
      padding: 4px 10px;
    }
    #variantList {
      margin-top: 10px;
      padding: 10px;
      border: 1px solid #ccc;
      background: #fafafa;
    }
    .section {
      margin-top: 30px;
      padding-top: 10px;
      border-top: 2px solid #ddd;
    }
  </style>
</head>
<body>

  <h2>Admin: Edit Product</h2>

  <div>
    <label>Name:</label><br>
    <input id="name" style="width: 100%;"><br><br>

    <label>Price:</label><br>
    <input id="price" type="number" step="0.01"><br><br>

    <label>Description:</label><br>
    <textarea id="description" style="width: 100%; height: 100px;"></textarea><br><br>

    <label>Category:</label><br>
    <select id="category"></select><br><br>

    <label>Image:</label><br>
    <input id="imageFile" type="file"><br><br>

    <button onclick="saveProduct()">Save Product</button>
  </div>

  <!-- ========================= -->
  <!-- VARIANT EDITOR SECTION -->
  <!-- ========================= -->
  <div class="section">
    <h3>Sizes & Stock</h3>
    <div id="variantList">Loading...</div>

    <h4>Add New Size</h4>
    <input id="newSize" placeholder="Size (e.g., XXL)">
    <input id="newStock" type="number" placeholder="Stock" value="0">
    <button onclick="addVariant()">Add Size</button>
  </div>

  <script>
    let currentProductId = null;

    // Load product ID from URL
    const params = new URLSearchParams(window.location.search);
    currentProductId = params.get("id");

    // ============================
    // LOAD PRODUCT DETAILS
    // ============================
    async function loadProduct() {
      if (!currentProductId) return;

      const res = await fetch(`/api/product/${currentProductId}`);
      const product = await res.json();

      document.getElementById("name").value = product.name;
      document.getElementById("price").value = product.price;
      document.getElementById("description").value = product.description;
      document.getElementById("category").value = product.category_id;

      loadVariants(currentProductId);
    }

    // ============================
    // LOAD CATEGORIES
    // ============================
    async function loadCategories() {
      const res = await fetch("/api/categories");
      const cats = await res.json();

      const select = document.getElementById("category");
      select.innerHTML = "";

      cats.forEach(c => {
        const opt = document.createElement("option");
        opt.value = c.id;
        opt.textContent = c.name;
        select.appendChild(opt);
      });
    }

    // ============================
    // SAVE PRODUCT
    // ============================
    async function saveProduct() {
      const formData = new FormData();
      formData.append("name", document.getElementById("name").value);
      formData.append("price", document.getElementById("price").value);
      formData.append("description", document.getElementById("description").value);
      formData.append("category_id", document.getElementById("category").value);

      const file = document.getElementById("imageFile").files[0];
      if (file) formData.append("imageFile", file);

      const res = await fetch(`/api/admin/product`, {
        method: "POST",
        body: formData
      });

      const data = await res.json();
      alert(data.message);
    }

    // ============================
    // LOAD VARIANTS
    // ============================
    async function loadVariants(productId) {
      const res = await fetch(`/api/admin/product/${productId}/variants`);
      const variants = await res.json();

      const container = document.getElementById("variantList");
      container.innerHTML = "";

      variants.forEach(v => {
        container.innerHTML += `
          <div class="variant-row">
            <strong>${v.size}</strong>
            <input type="number" value="${v.stock}" id="stock-${v.id}">
            <button onclick="updateVariant(${v.id})">Update</button>
            <button onclick="deleteVariant(${v.id})">Delete</button>
          </div>
        `;
      });
    }

    // ============================
    // UPDATE VARIANT
    // ============================
    async function updateVariant(id) {
      const stock = document.getElementById(`stock-${id}`).value;

      await fetch(`/api/admin/variant/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ stock })
      });

      alert("Stock updated");
    }

    // ============================
    // DELETE VARIANT
    // ============================
    async function deleteVariant(id) {
      await fetch(`/api/admin/variant/${id}`, { method: "DELETE" });
      loadVariants(currentProductId);
    }

    // ============================
    // ADD NEW VARIANT
    // ============================
    async function addVariant() {
      const size = document.getElementById("newSize").value;
      const stock = document.getElementById("newStock").value;

      await fetch(`/api/admin/product/${currentProductId}/variant`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ size, stock })
      });

      document.getElementById("newSize").value = "";
      document.getElementById("newStock").value = "0";

      loadVariants(currentProductId);
    }

    // Init
    loadCategories().then(loadProduct);
  </script>

</body>
</html>
