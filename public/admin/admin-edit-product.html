<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Product – Admin</title>

   
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">

   
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    
    <link rel="stylesheet" href="assets/css/styles.css">

   
    <style>
        body { display: none; }
    </style>
</head>

<body>


<script>
fetch("/api/session")
  .then(res => res.json())
  .then(data => {
    if (!data.loggedIn || !data.isAdmin) {
      window.location.href = "index.html";
    } else {
      document.body.style.display = "block";
    }
  });
</script>


<nav class="navbar navbar-expand-lg tron-navbar">
    <div class="container-fluid">

        <a class="navbar-brand d-flex align-items-center" href="admin-products.html">
            <img src="assets/images/logo.png" class="logo-icon me-2" alt="Galactic Threads Logo">
            <span class="brand-text">Admin Panel</span>
        </a>

        <span id="greeting" class="text-light ms-3"></span>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">

            
            <form id="searchForm" class="d-flex me-3" role="search">
                <select id="searchCategory" class="form-select me-2">
                    <option value="all">All</option>
                    <option value="men">Men</option>
                    <option value="women">Women</option>
                </select>

                <input id="searchInput" class="form-control me-2" type="search"
                       placeholder="Search products..." aria-label="Search products">

                <button class="btn tron-btn" type="submit">Search</button>
            </form>

            <ul class="navbar-nav ms-auto mb-2 mb-lg-0"></ul>
        </div>

    </div>
</nav>

<div class="tron-divider"></div>


<section class="admin-section">
    <h2 class="section-title">Edit Product</h2>

    <div class="container" style="max-width: 600px;">

        <form id="editProductForm" class="tron-form">

            <label class="form-label">Product Name</label>
            <input type="text" id="name" class="form-control" required>

            <label class="form-label mt-3">Price (£)</label>
            <input type="number" id="price" class="form-control" step="0.01" required>

            <label class="form-label mt-3">Description</label>
            <textarea id="description" class="form-control" rows="3"></textarea>

            <label class="form-label mt-3">Existing Image Path</label>
            <input type="text" id="image" class="form-control">

            <label class="form-label mt-3">Upload New Image</label>
            <input type="file" id="imageFile" class="form-control" accept="image/*">

            <img id="imagePreview" class="mt-3" style="max-width: 200px; display:none;" alt="Product image preview">

            <label class="form-label mt-3">Category</label>
            <select id="category" class="form-select" required></select>

            <label class="form-label mt-3">Active Status</label>
            <select id="active" class="form-select">
                <option value="1">Active</option>
                <option value="0">Inactive</option>
            </select>
            <small class="text-muted">Inactive products are hidden from the storefront.</small>

            <button class="checkout-btn mt-4 w-100">Save Changes</button>

        </form>

        <div class="text-center mt-3">
            <a href="admin-products.html" class="tron-link">← Back to Products</a>
        </div>

    </div>
</section>

<footer class="tron-footer">
    <div class="footer-content">
        <p>© 2026 Galactic Threads</p>
    </div>
</footer>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/assets/js/navbar.js"></script>
<script src="/assets/js/admin-edit-product.js"></script>

</body>
</html>
