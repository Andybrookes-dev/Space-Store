<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="/assets/css/styles.css">
</head>

<body>

<nav class="navbar navbar-expand-lg tron-navbar">
  <div class="container-fluid">

    <a class="navbar-brand d-flex align-items-center" href="/index.html">
      <img src="/assets/images/logo.png" class="logo-icon me-2">
      <span class="brand-text">Galactic Threads</span>
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-end" id="mainNav">
      <ul class="navbar-nav mb-2 mb-lg-0">
        <li class="nav-item"><a href="admin.html" class="nav-link tron-nav-link">Dashboard</a></li>
        <li class="nav-item"><a href="admin-products.html" class="nav-link tron-nav-link">Products</a></li>
        <li class="nav-item"><a href="admin-categories.html" class="nav-link tron-nav-link">Categories</a></li>

      </ul>
    </div>

  </div>
</nav>

<div class="tron-divider"></div>

<script>
async function checkAdminAccess() {
    const res = await fetch("/api/session");
    const session = await res.json();

    if (!session.loggedIn || !["superadmin", "admin"].includes(session.role)) {
        window.location.href = "index.html";
    }
}
checkAdminAccess();
</script>

<div class="container" style="max-width: 700px; padding-top: 30px;">

    <h2 class="section-title">Reorder Products</h2>
    <div class="tron-divider"></div>

    <h3 class="tron-subtitle">Women</h3>
    <ul id="womenList" class="sortable-list"></ul>

    <h3 class="tron-subtitle">Men</h3>
    <ul id="menList" class="sortable-list"></ul>

    <button class="save-btn" onclick="saveOrder()">Save Order</button>

    <div id="toast" class="toast-box">Order Saved!</div>

</div>

<footer class="tron-footer">
    <p>© 2026 Galactic Threads</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
