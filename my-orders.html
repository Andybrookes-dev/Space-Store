<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Orders – Galactic Threads</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="assets/css/styles.css">

    <!-- Prevent UI flicker before session validation -->
    <style>
        body { display: none; }
    </style>
</head>

<body>

<!-- ⭐ FAST SESSION CHECK ⭐ -->
<script>
fetch("/api/session")
  .then(res => res.json())
  .then(data => {
    if (!data.loggedIn) {
      window.location.href = "login.html";
    } else {
      document.body.style.display = "block";
    }
  });
</script>

<!-- ⭐ UNIVERSAL NAVBAR ⭐ -->
<nav class="navbar navbar-expand-lg tron-navbar">
    <div class="container-fluid">

        <a class="navbar-brand d-flex align-items-center" href="index.html">
            <img src="assets/images/logo.png" class="logo-icon me-2" alt="Galactic Threads Logo">
            <span class="brand-text">Galactic Threads</span>
        </a>

        <span id="greeting" class="text-light ms-3"></span>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarSupportedContent">

            <!-- CATEGORY-AWARE SEARCH BAR -->
            <form id="searchForm" class="d-flex me-3" role="search">
                <select id="searchCategory" class="form-select me-2">
                    <option value="all">All</option>
                    <option value="men">Men</option>
                    <option value="women">Women</option>
                </select>

                <input id="searchInput" class="form-control me-2" type="search"
                       placeholder="Search products..." aria-label="Search products">

                <button class="btn tron-btn" type="submit">Search</button>
            </form>

            <ul class="navbar-nav ms-auto mb-2 mb-lg-0"></ul>
        </div>

    </div>
</nav>

<div class="tron-divider"></div>

<!-- ⭐ MAIN CONTENT ⭐ -->
<section class="orders-section">
    <h2 class="section-title">My Orders</h2>

    <div class="container" style="max-width: 800px;">

        <!-- Orders will be injected here by my-orders.js -->
        <div id="ordersContainer" class="mt-4"></div>

    </div>
</section>

<footer class="tron-footer">
    <div class="footer-content">
        <p>© 2026 Galactic Threads</p>
    </div>
</footer>

<!-- ⭐ JS (Correct Order) ⭐ -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/navbar.js"></script>
<script src="assets/js/my-orders.js"></script>

</body>
</html>
