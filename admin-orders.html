<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin – Orders</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>
<script>
fetch("/api/session")
  .then(res => res.json())
  .then(data => {
    if (!data.loggedIn || !data.isAdmin) {
      window.location.href = "index.html";
    }
  });
</script>



<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg tron-navbar">
  <div class="container-fluid">

    <a class="navbar-brand d-flex align-items-center" href="index.html">
      <img src="assets/images/logo.png" class="logo-icon me-2">
      <span class="brand-text">Galactic Threads</span>
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-end" id="mainNav">
      <ul class="navbar-nav mb-2 mb-lg-0">
        <li class="nav-item"><a href="admin.html" class="nav-link tron-nav-link">Dashboard</a></li>
        <li class="nav-item"><a href="admin-products.html" class="nav-link tron-nav-link">Products</a></li>
        <li class="nav-item"><a href="admin-categories.html" class="nav-link tron-nav-link">Categories</a></li>
        <li class="nav-item"><a href="admin-orders.html" class="nav-link tron-nav-link active">Orders</a></li>
        <li class="nav-item"><a href="admin-reorder.html" class="nav-link tron-nav-link">Reorder</a></li>
        <li class="nav-item"><a href="#" onclick="logout()" class="nav-link tron-nav-link">Logout</a></li>
      </ul>
    </div>

  </div>
</nav>

<div class="tron-divider"></div>

<section class="admin-section">
    <h2 class="section-title">Manage Orders</h2>

    <div class="container">

        <table class="table table-dark table-striped table-bordered align-middle">
            <thead>
                <tr>
                    <th>Order ID</th>
                    <th>User Email</th>
                    <th>Total (£)</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th style="width: 160px;">Actions</th>
                </tr>
            </thead>
            <tbody id="ordersTable"></tbody>
        </table>

    </div>
</section>

<footer class="tron-footer">
    <div class="footer-content">
        <p>© 2026 Galactic Threads</p>
    </div>
</footer>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="assets/js/admin-orders.js"></script>





<div class="modal fade" id="itemsModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content tron-modal">
      <div class="modal-header">
        <h5 class="modal-title">Order Items</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="itemsBody">
        <!-- Items load here -->
      </div>
    </div>
  </div>
</div>
