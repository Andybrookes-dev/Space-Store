<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Confirmation – Galactic Threads</title>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>

<body>

<script>
if (!localStorage.getItem("gt_email")) {
    window.location.href = "login.html";
}
</script>

<nav class="navbar navbar-expand-lg tron-navbar">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="index.html">
            <img src="assets/images/logo.png" class="logo-icon me-2">
            <span class="brand-text">Galactic Threads</span>
        </a>
    </div>
</nav>

<div class="tron-divider"></div>

<section class="women-section">
    <h2 class="section-title">Order Confirmed</h2>

    <div class="container" style="max-width: 800px;">

        <div class="tron-card p-5 text-center">

            <h3 class="text-light mb-3">Thank you for your order!</h3>

            <p class="text-info fs-5">Your order has been successfully placed.</p>

            <p class="text-light mt-4">
                <strong>Order ID:</strong>
                <span id="orderId" class="text-warning"></span>
            </p>

            <hr class="tron-divider">

            <h4 class="text-light mb-3">Delivery Address</h4>
            <p id="deliveryAddress" class="text-light"></p>

            <hr class="tron-divider">

            <h4 class="text-light mb-3">Items</h4>
            <div id="orderItems"></div>

            <h4 class="text-light mt-4">Total: £<span id="orderTotal">0.00</span></h4>

            <div class="mt-4">
                <a href="orders.html" class="checkout-btn me-3">View Your Orders</a>
                <a href="index.html" class="tron-link">Return to Homepage</a>
            </div>

        </div>

    </div>
</section>

<footer class="tron-footer">
    <div class="footer-content">
        <p>© 2026 Galactic Threads</p>
    </div>
</footer>

<script>
const email = localStorage.getItem("gt_email");
const orderId = localStorage.getItem("gt_last_order");
document.getElementById("orderId").innerText = orderId || "N/A";

// Load order details
async function loadOrder() {
    const res = await fetch(`/api/orders?email=${email}`);
    const orders = await res.json();

    const order = orders.find(o => o.id == orderId);
    if (!order) return;

    const addressHtml = `
        ${order.full_name}<br>
        ${order.address_line1}<br>
        ${order.address_line2 ? order.address_line2 + "<br>" : ""}
        ${order.city}<br>
        ${order.postcode}<br>
        ${order.country}
    `;

    document.getElementById("deliveryAddress").innerHTML = addressHtml;
    document.getElementById("orderTotal").innerText = order.total.toFixed(2);
}

// Load order items
async function loadItems() {
    const res = await fetch(`/api/admin/order/${orderId}/items`);
    const items = await res.json();

    const container = document.getElementById("orderItems");
    container.innerHTML = "";

    items.forEach(item => {
        container.innerHTML += `
            <div class="d-flex justify-content-between text-light mb-2">
                <span>${item.name} – ${item.size} (x${item.quantity})</span>
                <span>£${(item.price * item.quantity).toFixed(2)}</span>
            </div>
        `;
    });
}

loadOrder();
loadItems();

// Clear stored order ID after loading
localStorage.removeItem("gt_last_order");
</script>

</body>
</html>
